name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: fmt & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build (appengine safe path)
        run: go build -tags appengine ./...
      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod

  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: [ '1.25.x', '1.26.x', 'stable' ]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: test (-race)
        run: go test -race -shuffle=on ./...
      - name: test (-race, -tags nounsafe)
        run: go test -race -shuffle=on -tags nounsafe ./...
